<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Testing</title>
</head>
<style>
    body {
        margin: 0;
        overflow-x: hidden;
    }

    .section1, .section2, .section3, .section4, .section5, .section6 {
        position: relative;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
    }

    /* Glassmorphism effect from https://css.glass */
    .div1 {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: rgba(0, 8, 255, 0.498);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(14.1px);
        -webkit-backdrop-filter: blur(14.1px);
    }

    .video1, .video2, .video3, .video4 {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .div2 {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: rgba(0, 0, 0, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
    }

    .div3 {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: rgba(119, 0, 255, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
    }

    .div4 {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: rgba(0, 0, 0, 0.1);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        backdrop-filter: blur(50px);
        -webkit-backdrop-filter: blur(50px);
    }

    .div5 {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        /**/
        background: rgba(255, 255, 255, 0);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
        
    }

    .animated-bg {
        position: absolute;
        width: 100%;
        height: 100%;
        background-color: #000A13;
        z-index: 1;
    }

    .circle {
        position: absolute;
        border-radius: 50%;
        filter: blur(40px) brightness(1.2) drop-shadow(0 0 40px currentColor);
    }

    .div6 {
        position: absolute;
        width: 100%;
        height: 100%;
        z-index: 2;
        background: rgba(255, 255, 255, 0);
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0);
        backdrop-filter: blur(40px);
        -webkit-backdrop-filter: blur(40px);
    }

    .bg1 {
        position: absolute;
        width: 100%;
        height: 100%;
        background: url('assets/bg1.jpg') no-repeat center center/cover;
    }

</style>
<body>
    <div class="section1">
        <div class="div1">
            <!-- For glass effect -->
        </div>
        <video src="assets/test1.mp4" class="video1" autoplay muted loop></video>
    </div>

    <div class="section2">
        <div class="div2">
            <!-- For glass effect -->
        </div>
        <video src="assets/test2.mp4" class="video2" autoplay muted loop></video>
    </div>

    <div class="section3">
        <div class="div3">
            <!-- For glass effect -->
        </div>
        <video src="assets/test3.mp4" class="video3" autoplay muted loop></video>
    </div>

    <div class="section4">
        <div class="div4">
            <!-- For glass effect -->
        </div>
        <video src="assets/test4.mp4" class="video4" autoplay muted loop></video>
    </div>

    <div class="section5">
        <div class="div5">
            <!-- For glass effect -->
        </div>
        <div class="animated-bg">
            <!-- Animated circles in different blue shades -->
            <div class="circle" id="circle1" style="width: 450px; height: 450px; background: #070056; left: 25%; top: 5%; opacity: 0.8;"></div>
            <div class="circle" id="circle2" style="width: 600px; height: 600px; background: #0066FF; left: 30%; top: -5%; opacity: 0.7;"></div>
            <div class="circle" id="circle3" style="width: 375px; height: 375px; background: #00F6FF; left: 35%; top: 35%; opacity: 0.9;"></div>
            <div class="circle" id="circle4" style="width: 525px; height: 525px; background: #0048FF; left: 40%; top: 45%; opacity: 0.8;"></div>
            <div class="circle" id="circle5" style="width: 300px; height: 300px; background: #1500FF; left: 45%; top: 55%; opacity: 0.7;"></div>
            <div class="circle" id="circle6" style="width: 480px; height: 480px; background: #1100CB; left: 50%; top: 0%; opacity: 0.8;"></div>
            <div class="circle" id="circle7" style="width: 420px; height: 420px; background: #0D009C; left: 55%; top: 55%; opacity: 0.9;"></div>
            <div class="circle" id="circle8" style="width: 330px; height: 330px; background: #1100CB; left: 60%; top: 25%; opacity: 0.7;"></div>
        </div>
    </div>

    <div class="section6">
        <div class="div6">
            <!-- For glass effect -->
        </div>
        <div class="bg1"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        // document.querySelector('.video4').playbackRate = 0.5;

        // Animate circles with GSAP - seamless looping
        gsap.to("#circle1", { x: 200, y: 150, duration: 10, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle2", { x: -250, y: 180, duration: 12, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle3", { x: 180, y: -200, duration: 9, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle4", { x: -220, y: -150, duration: 11, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle5", { x: 150, y: 220, duration: 8, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle6", { x: -180, y: 200, duration: 13, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle7", { x: 240, y: -180, duration: 10, repeat: -1, yoyo: true, ease: "sine.inOut" });
        gsap.to("#circle8", { x: -200, y: 160, duration: 9, repeat: -1, yoyo: true, ease: "sine.inOut" });

        // Staggered glow animations - 4 groups with different timing
        // Group 1: circles 1 & 2 - medium glow
        gsap.to("#circle1, #circle2", {
            filter: "blur(40px) brightness(1.5) drop-shadow(0 0 60px currentColor)",
            duration: 4,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut"
        });

        // Group 2: circles 3 & 4 - brighter, slower glow
        gsap.to("#circle3, #circle4", {
            filter: "blur(40px) brightness(1.7) drop-shadow(0 0 70px currentColor)",
            duration: 6,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            delay: 1,
            repeatDelay: 0
        });

        // Group 3: circles 5 & 6 - subtle, faster glow
        gsap.to("#circle5, #circle6", {
            filter: "blur(40px) brightness(1.3) drop-shadow(0 0 50px currentColor)",
            duration: 3,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            delay: 2,
            repeatDelay: 0
        });

        // Group 4: circles 7 & 8 - intense, medium-fast glow
        gsap.to("#circle7, #circle8", {
            filter: "blur(40px) brightness(1.6) drop-shadow(0 0 65px currentColor)",
            duration: 5,
            repeat: -1,
            yoyo: true,
            ease: "sine.inOut",
            delay: 3,
            repeatDelay: 0
        });
    </script>
</body>
</html>
